name: Train model

permissions:
  contents: write

on:
  # 定时触发
  schedule:
    # 分 时 日 月 周 (UTC时间)
    - cron: '0 13 * * *'

  # 保留手动触发按钮，方便调试
  workflow_dispatch:

jobs:
  check-home-access:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 下载最新qlib_bin.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. 下载名为 qlib_bin.tar.gz 的附件到当前目录
          gh release download --repo chenditc/investment_data --pattern "qlib_bin.tar.gz"

          # 2. 解压文件
          echo ">>> 正在解压数据..."
          mkdir -p ~/.qlib/qlib_data/cn_data

          tar -zxf qlib_bin.tar.gz -C ~/.qlib/qlib_data/cn_data --strip-components=1
          
          # 3. 验证解压后的内容
          tail -n1   ~/.qlib/qlib_data/cn_data/calendars/day.txt

      - name: 2. Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main         # 显式指定拉取 main 分支
          fetch-depth: 1    # 只拉取最新一次提交以节省时间

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # 建议使用 '3.12' 匹配最新稳定补丁，若强行指定不存在的版本会报错

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          else
            echo "⚠️ 警告: 未找到 requirements.txt，跳过安装。"
          fi

      - name: Run Train
        run: |
          echo "开始 train "
          cd ./roll && python ./roll.py --pfx_name="EXP" --model_name="LightGBM" --dataset_name="Alpha158" --stock_pool="csi300" --rolling_type="custom" train start_custom
          # cd ./roll && python ../script/run.py

      - name: LS model
        run: |
          echo "model ls "
          cd ./roll && python ./roll.py model ls all=1 
        
      - name: compress model
        run: |
          echo "compress model pkl "
          cd ./roll && python ./roll.py model compress_mlruns 

      - name: Commit and Push Model Files
        run: |
          # 1. 配置 Git 用户信息（使用 GitHub Actions Bot 的默认身份）
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 2. 检查是否有新生成的压缩包并添加
          # 假设你的压缩包在 model_pkl 目录下
          git add model_pkl/*.tar.gz
          
          # 3. 提交更改
          # 使用 [skip ci] 防止触发死循环，并加上当前日期作为备注
          git commit -m "Auto-update trained models $(date +'%Y-%m-%d') [skip ci]" || echo "No changes to commit"
          
          # 4. 推送到当前分支
          git push

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          # 使用日期作为 Tag 名称，例如 2026-03-07
          tag_name: model-release-${{ github.event.schedule || 'manual' }}-${{ github.run_id }}
          name: Model Release $(date +'%Y-%m-%d')
          body: |
            自动训练模型发布
            - 训练日期: $(date +'%Y-%m-%d')
            - 任务 ID: ${{ github.run_id }}
          # 指定你的压缩包路径，支持通配符
          files: |
            model_pkl/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}