name: 部署 VitePress 网页

on:
  workflow_dispatch:
  push:
    branches: [ qlib_score ]
    paths:
      - 'qlib_score_csv/**'
      - 'page/**'
  workflow_run:
    workflows: ["Analysis"]
    types:
      - completed

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: qlib_score
          fetch-depth: 0

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: page/package-lock.json

      - name: 构建 VitePress
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          cd page
          npm ci
          npm run docs:build

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./page/docs/.vitepress/dist
